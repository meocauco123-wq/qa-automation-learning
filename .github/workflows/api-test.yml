name: API Test CI

on:
  push:
    branches:
      - main
      - feature/*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run all tests
        run: |
          node tests/auth/authFlow.test.js
          node tests/auth/authNegative.test.js
          node tests/auth/authChain.test.js